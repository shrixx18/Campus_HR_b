worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    underscores_in_headers on;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    upstream identity_service {
        server identity-service:8001;
    }

    upstream opportunity_service {
        server opportunity-service:8002;
    }

    upstream application_service {
        server application-service:8003;
    }

    upstream communications_service {
        server communications-service:8004;
    }

    server {
        listen 80;
        server_name localhost;

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Id, X-User-Role" always;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location = /auth/validate {
            internal;
            proxy_pass http://identity_service/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
        }

        # Public auth endpoints
        location ~ ^/api/v1/auth/(register|login|refresh)$ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
        }

        # Protected auth endpoints
        location ~ ^/api/v1/auth/(me|profile|logout) {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location = /api/v1/auth/profile {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location ~ ^/api/v1/auth/profile/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
        }

        # Public opportunity reads
        location = /api/v1/opportunities {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://opportunity_service;
            proxy_set_header Host $host;
        }

        location ~ ^/api/v1/opportunities/[0-9a-f-]+$ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://opportunity_service;
            proxy_set_header Host $host;
        }

        # Protected opportunity mutations
        location /api/v1/opportunities/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_pass http://opportunity_service;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location /api/v1/applications {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_pass http://application_service;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location /api/v1/queries {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_pass http://communications_service;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location /api/v1/notifications {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_pass http://communications_service;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location /api/v1/files/ {
            proxy_pass http://application_service;
            proxy_set_header Host $host;
        }
    }
}
